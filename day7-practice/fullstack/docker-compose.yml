version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: taskdb
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U taskuser -d taskdb']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Flask API
  flask-api:
    image: my-flask-app:1.0
    container_name: taskapi
    ports:
      - '5000:5000'
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
